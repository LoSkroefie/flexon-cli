name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore FlexonCLI.sln
      - run: dotnet build FlexonCLI.sln --configuration Release --no-restore
      - run: dotnet test FlexonCLI.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore

  pack:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore FlexonCLI.sln
      - run: dotnet build FlexonCLI.sln --configuration Release --no-restore
      - run: dotnet pack Flexon.Core/Flexon.Core.csproj --configuration Release --no-build --output artifacts
      - run: dotnet pack FlexonCLI/FlexonCLI.csproj --configuration Release --no-build --output artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          if-no-files-found: error
